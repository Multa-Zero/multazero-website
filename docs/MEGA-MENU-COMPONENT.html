<!-- ==================== CSS ==================== -->

<style>
    /* ================================================
   MEGA MENU — Component Styles
   Reusa tokens de styles.css (:root)
   ================================================ */

    /* Trigger button */
    .dropdown-trigger {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
        font-size: 16px;
        color: inherit;
        padding: 0;
        transition: opacity 200ms;
    }

    .dropdown-trigger:hover {
        opacity: 0.8;
    }

    .dropdown-arrow {
        transition: transform 300ms ease;
    }

    .nav-item.active .dropdown-arrow {
        transform: rotate(180deg);
    }

    /* Dropdown panel */
    .mega-dropdown {
        position: absolute;
        top: 72px;
        left: 50%;
        transform: translateX(-50%) translateY(-8px);
        width: 960px;
        max-width: calc(100vw - 48px);
        background-color: var(--surface-elevated);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-lg);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 250ms ease, transform 250ms ease, visibility 250ms;
        z-index: 200;
    }

    .nav-item.active .mega-dropdown {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
    }

    .mega-dropdown-inner {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 240px;
        gap: var(--space-8);
        padding: var(--space-32);
    }

    /* Columns */
    .mega-col {
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
    }

    .mega-col-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-secondary);
        padding: var(--space-8) var(--space-12);
        margin-bottom: var(--space-4);
    }

    /* Individual menu items */
    .mega-item {
        display: flex;
        align-items: flex-start;
        gap: var(--space-12);
        padding: var(--space-12);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--text-primary);
        transition: background-color 150ms ease;
    }

    .mega-item:hover {
        background-color: var(--neutral-1);
    }

    .mega-icon {
        width: 36px;
        height: 36px;
        min-width: 36px;
        background-color: var(--neutral-2);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        transition: background-color 150ms ease, color 150ms ease;
    }

    .mega-item:hover .mega-icon {
        background-color: var(--blue-ribbon-1);
        color: var(--blue-ribbon-7);
    }

    .mega-item-title {
        display: block;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.3;
    }

    .mega-item-desc {
        display: block;
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.4;
        margin-top: 2px;
    }

    /* Featured column */
    .mega-col-featured {
        border-left: 1px solid var(--border-default);
        padding-left: var(--space-24);
    }

    .mega-featured-card {
        display: flex;
        flex-direction: column;
        gap: var(--space-8);
        padding: var(--space-12);
    }

    .mega-featured-img {
        width: 100%;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-default);
        box-shadow: var(--shadow-sm);
    }

    .mega-featured-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
    }

    .mega-featured-desc {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.4;
    }

    /* ================================================
   MOBILE MEGA MENU (accordion style)
   ================================================ */
    @media (max-width: 1024px) {
        .mega-dropdown {
            position: static;
            transform: none;
            width: 100%;
            max-width: 100%;
            border: none;
            border-radius: 0;
            box-shadow: none;
            background-color: transparent;
            max-height: 0;
            overflow: hidden;
            transition: max-height 300ms ease, opacity 300ms ease;
        }

        .nav-item.active .mega-dropdown {
            transform: none;
            max-height: 600px;
        }

        .mega-dropdown-inner {
            grid-template-columns: 1fr;
            padding: var(--space-16) 0;
            gap: var(--space-16);
        }

        .mega-col-featured {
            border-left: none;
            border-top: 1px solid var(--border-default);
            padding-left: 0;
            padding-top: var(--space-16);
        }

        .mega-col-title {
            padding: var(--space-4) var(--space-12);
        }
    }
</style>
